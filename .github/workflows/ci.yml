name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────
  # JOB 1: Install dependencies and run tests
  # ─────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required: Gitleaks needs full git history

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'  # Caches node_modules between runs

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test

  # ─────────────────────────────────────────────────────
  # JOB 2: Security scans (runs after job 1 passes)
  # ─────────────────────────────────────────────────────
  security-scan:
    name: Security Scans
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── 2a. Dependency Vulnerability Scan ──
      - name: Dependency Scan (npm audit)
        run: npm audit --audit-level=high
        # Fails only on HIGH or CRITICAL severity vulnerabilities.
        # Prisma/Express may have low/moderate advisories — those are ignored here.

      # ── 2b. SAST - Semgrep ──
      - name: SAST Scan (Semgrep)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/nodejs
            p/javascript
            p/owasp-top-ten
            p/jwt
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # ── 2c. Secret Scanning - Gitleaks ──
      - name: Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────
  # JOB 3: Build and push Docker image
  # Only runs on actual pushes to main, NOT on pull requests
  # ─────────────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/todo-app:${{ github.sha }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/todo-app:latest \
            .

      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/todo-app:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/todo-app:latest

      - name: Print image info
        run: |
          echo "✅ Images pushed to Docker Hub:"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/todo-app:latest"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/todo-app:${{ github.sha }}"