version: '3'
services:
  app:
    image: marcelsmarcel/todo-app:latest
    container_name: todo-app
    env_file:
      - .env
    ports:
      - "5003:5003"
    depends_on:
      db:
        condition: service_healthy         
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: todo-db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: